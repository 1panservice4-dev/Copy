name: Build YGOPro OCGCore WebAssembly Fixed

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 1. 저장소 소스코드 체크아웃
      uses: actions/checkout@v4

    - name: 2. Emscripten(emsdk) 컴파일러 환경 세팅
      uses: mymindstorm/setup-emsdk@v14
      with:
        version: 3.1.64

    - name: 3. C# 파일 제외 및 표준 함수만 지정하여 빌드
      run: |
        # 1. 유니티 C# 파일인 ocgcore.c를 컴파일 대상에서 안전하게 제외합니다.
        mkdir -p temp_hide
        if [ -f ocgcore.c ]; then mv ocgcore.c temp_hide/; fi
        
        # 2. 호환성이 검증된 표준 OCGCore 익스포트 함수들만 지정하여 컴파일합니다.
        # 경고를 뿜던 EXTRA_EXPORTED_RUNTIME_METHODS도 최신 문법인 EXPORTED_RUNTIME_METHODS로 교정했습니다.
        emcc -O3 -s WASM=1 -fdeclspec \
          -s EXPORTED_FUNCTIONS="['_create_duel', '_start_duel', '_end_duel', '_set_card_reader', '_set_script_reader', '_set_message_handler']" \
          -s EXPORTED_RUNTIME_METHODS="['cwrap', 'ccall']" \
          -s ALLOW_MEMORY_GROWTH=1 \
          -o ocgcore.js \
          *.cpp *.c

    - name: 4. 컴파일 완료된 자바스크립트 및 WASM 추출
      uses: actions/upload-artifact@v4
      with:
        name: ygopro-web-engine
        path: |
          ocgcore.js
          ocgcore.wasm
