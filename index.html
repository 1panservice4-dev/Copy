<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web YGOPRO 클라이언트 (HTML5/Canvas)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* 메인 게임 컨테이너 (CSS3 배치) */
        #game-container {
            display: flex;
            gap: 15px;
            background: #262626;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* HTML5 Canvas (유니티 3D 뷰포트 대체) */
        #game-canvas {
            background: #333333;
            border: 2px solid #444;
            border-radius: 6px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        /* 우측 카드 디스크립션 패널 */
        #side-panel {
            width: 300px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #card-preview {
            width: 100%;
            height: 400px;
            background: #111;
            border: 2px solid #555;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #card-preview img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        #log-console {
            flex-grow: 1;
            background: #111;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 10px;
            font-family: monospace;
            font-size: 12px;
            color: #0f0;
            overflow-y: auto;
            height: 180px;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="game-canvas" width="1024" height="600"></canvas>

        <div id="side-panel">
            <div id="card-preview">
                <span id="preview-placeholder" style="color: #666;">카드 호버/선택 시 표시</span>
                <img id="preview-image" src="" style="display: none;" alt="Card Preview">
            </div>
            <div id="log-console">> 시스템 초기화 중...</div>
        </div>
    </div>

    <script src="ocgcore.js" onerror="log('지정된 ocgcore.js 엔진을 찾을 수 없습니다. WASM 빌드가 선행되어야 합니다.', 'red')"></script>

    <script>
        // --- 1. 유니티 C# 환경 변수 및 상태(Condition) 이식 ---
        const Condition = { N: 0, duel: 1, watch: 2, record: 3 };
        
        const state = {
            condition: Condition.duel,
            masterRule: 0,
            inAI: false,
            codeForShow: 0,
            cards: [],        // List<gameCard> 대체
            linkMaskList: []  // List<linkMask> 대체
        };

        // UI 뷰포트 레이아웃 상수 (C#의 gameInfo 구조체 및 윈도우 크기 함수 대체)
        const gameInfo = { width: 1024, height: 600 };
        const cardDescription = { width: 300 };

        // 유니티의 getScreenCenter() 공식 구현 (웹 브라우저 화면 기준 동적 변환)
        function getScreenCenter() {
            return (window.innerWidth + cardDescription.width - gameInfo.width) / 2;
        }

        // --- 2. HTML5 Canvas 2D 렌더링 루프 (유니티 Update 및 렌더러 대체) ---
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const previewImg = document.getElementById('preview-image');
        const placeholder = document.getElementById('preview-placeholder');

        // 로그 출력 유틸리티
        function log(message, color = '#0f0') {
            const consoleDiv = document.getElementById('log-console');
            consoleDiv.innerHTML += `<br><span style="color: ${color};">> ${message}</span>`;
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
        }

        // 가상 카드 클래스 생성 (유니티 gameCard 오브젝트 래핑)
        class GameCard {
            constructor(id, code, x, y) {
                this.id = id;
                this.code = code; // 카드 고유 번호 (예: 24094653)
                this.x = x;
                this.y = y;
                this.width = 70;
                this.height = 102;
                this.isHovered = false;
            }

            draw(context) {
                // 카드 기본 틀 그리기
                context.fillStyle = '#2d1e18'; // 효과 몬스터 프레임 색상 대략 지정
                context.fillRect(this.x, this.y, this.width, this.height);
                context.strokeStyle = this.isHovered ? '#ff0' : '#fff';
                context.lineWidth = this.isHovered ? 3 : 1;
                context.strokeRect(this.x, this.y, this.width, this.height);

                // 카드 텍스트 정보 (ID) 표시
                context.fillStyle = '#fff';
                context.font = '10px monospace';
                context.fillText(this.code, this.x + 5, this.y + 20);
            }
        }

        // 임의의 필드 초기화 (테스트용 카드 배치)
        function initGameField() {
            // 패(Hand)와 몬스터 존에 가상 카드 세팅
            state.cards.push(new GameCard(1, 24094653, 200, 450)); // 블랙 매지션
            state.cards.push(new GameCard(2, 89631139, 300, 450)); // 푸른 눈의 백룡
            state.cards.push(new GameCard(3, 46986414, 400, 250)); // 필드 카드 예시
            log("게임 필드 데이터(2D 레이아웃) 설정 완료.");
        }

        // 유니티 렌더링 프레임 루프 대체 (requestAnimationFrame)
        function gameLoop() {
            // 화면 클리어
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 배경 격자(유희왕 필드 라인 가상 표현)
            ctx.strokeStyle = '#444';
            ctx.lineWidth = 1;
            // 몬스터 / 마함 존 구분 라인
            ctx.strokeRect(150, 150, 720, 160); // 메인 몬스터 존 영역
            ctx.strokeRect(150, 320, 720, 160); // 마법 함정 존 영역

            // 등록된 모든 카드 그리기
            state.cards.forEach(card => card.draw(ctx));

            requestAnimationFrame(gameLoop);
        }

        // --- 3. 유니티의 animation_show_card_code_handler() 이벤트 자바스크립트 이식 ---
        function triggerCardShower(code) {
            state.codeForShow = code;
            log(`animation_show_card_code_handler 트리거됨 (Card Code: ${code})`);
            
            // 유니티 GameTextureManager.get 대신 웹 이미지 패스 연동
            // 실제 서비스 시 해당 경로에 카드 일러스트 이미지(데이터베이스) 연동 필요
            const imageUrl = `https://images.ygoprodeck.com/images/cards/${code}.jpg`;
            
            placeholder.style.display = 'none';
            previewImg.src = imageUrl;
            previewImg.style.display = 'block';
        }

        // 마우스 인터랙션 처리 (유니티 Raycast 및 마우스 이벤트 감지 대체)
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            let hoveredAny = false;
            state.cards.forEach(card => {
                if (mouseX >= card.x && mouseX <= card.x + card.width &&
                    mouseY >= card.y && mouseY <= card.y + card.height) {
                    card.isHovered = true;
                    hoveredAny = true;
                    if (state.codeForShow !== card.code) {
                        triggerCardShower(card.code); // 마우스 호버 시 카드 보여주기 핸들러 작동
                    }
                } else {
                    card.isHovered = false;
                }
            });
        });

        // --- 4. WebAssembly 웹어셈블리 두뇌(ocgcore.js)와의 가교 바인딩 ---
        var Module = {
            onRuntimeInitialized: function() {
                log("WASM 핵심 룰 두뇌 엔진(ocgcore.js) 결합 성공!");
                
                try {
                    // C++ export 함수들 바인딩
                    const create_duel = Module.cwrap('create_duel', 'number', ['number']);
                    
                    log("가상 듀얼 인스턴스 생성 프로세스를 초기화합니다.");
                    let seed = Math.floor(Math.random() * 99999);
                    let duelPointer = create_duel(seed);
                    
                    log(`[성공] WebAssembly 메모리 주소 ${duelPointer}에 룰 엔진 바인딩 완료.`, '#00ffff');
                } catch (err) {
                    log(`엔진 링크 오류 (서버 환경 필요): ${err.message}`, 'red');
                }

                // 렌더링 및 필드 시작
                initGameField();
                gameLoop();
            }
        };

        // 로컬 테스트(WASM 부재 상태) 대응용 백업 자동 구동 루프
        setTimeout(() => {
            if (state.cards.length === 0) {
                log("자립형 웹 클라이언트 GUI 데모 모드로 구동합니다.", '#ffaa00');
                initGameField();
                gameLoop();
            }
        }, 1000);
    </script>
</body>
</html>
