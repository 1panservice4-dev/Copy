name: Build YGOPro OCGCore WebAssembly Fixed

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 1. 저장소 소스코드 체크아웃
      uses: actions/checkout@v4

    - name: 2. Emscripten(emsdk) 컴파일러 환경 세팅
      uses: mymindstorm/setup-emsdk@v14
      with:
        version: 3.1.64

    - name: 3. C# 유니티 스크립트(ocgcore.c)를 제외하고 컴파일
      run: |
        # 1. 임시 폴더를 만들어 유니티 C# 파일인 ocgcore.c를 컴파일 대상에서 안전하게 제외합니다.
        mkdir -p temp_hide
        if [ -f ocgcore.c ]; then mv ocgcore.c temp_hide/; fi
        
        # 2. 방해꾼이 사라진 상태에서 순수 C++/C 파일들만 모아 윈도우 호환 옵션(-fdeclspec)과 함께 컴파일합니다.
        emcc -O3 -s WASM=1 -fdeclspec \
          -s EXPORTED_FUNCTIONS="['_create_duel', '_start_duel', '_end_duel', '_set_card_reader', '_set_script_reader', '_set_message_handler', '_process_command', '_get_log_message']" \
          -s EXTRA_EXPORTED_RUNTIME_METHODS="['cwrap', 'ccall']" \
          -s ALLOW_MEMORY_GROWTH=1 \
          -o ocgcore.js \
          *.cpp *.c

    - name: 4. 컴파일 완료된 자바스크립트 및 WASM 추출
      uses: actions/upload-artifact@v4
      with:
        name: ygopro-web-engine
        path: |
          ocgcore.js
          ocgcore.wasm
