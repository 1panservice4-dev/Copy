<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web YGOPRO 클라이언트</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #game-container {
            display: flex;
            gap: 15px;
            background: #262626;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #game-canvas {
            background: #1f2421;
            border: 2px solid #444;
            border-radius: 6px;
        }
        #side-panel {
            width: 280px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        #card-preview {
            width: 100%;
            height: 380px;
            background: #111;
            border: 2px solid #555;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        #card-preview img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        #log-console {
            flex-grow: 1;
            background: #111;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 10px;
            font-family: monospace;
            font-size: 11px;
            color: #0f0;
            overflow-y: auto;
            height: 190px;
        }
        .btn-panel {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
        }
        button {
            background: #444;
            color: #fff;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover { background: #555; }
    </style>
</head>
<body>

    <div class="btn-panel">
        <button onclick="addDemoCard(0, CardLocation.Hand, 24094653)">내 패에 추가 (블랙 매지션)</button>
        <button onclick="addDemoCard(0, CardLocation.Hand, 89631139)">내 패에 추가 (백룡)</button>
        <button onclick="addDemoCard(0, CardLocation.MonsterZone, 46986414)">내 몬스터존 0번 소환</button>
        <button onclick="addDemoCard(1, CardLocation.MonsterZone, 74677422)">상대 몬스터존 0번 소환</button>
    </div>

    <div id="game-container">
        <canvas id="game-canvas" width="1024" height="600"></canvas>
        <div id="side-panel">
            <div id="card-preview">
                <span id="preview-placeholder" style="color: #666;">카드에 마우스를 올리세요</span>
                <img id="preview-image" src="" style="display: none;" alt="Card Preview">
            </div>
            <div id="log-console">> 시스템 초기화 중...</div>
        </div>
    </div>

    <script src="ocgcore.js" onerror="log('ocgcore.js를 로드할 수 없습니다. 로컬 테스트 모드로 진입합니다.', '#ffaa00')"></script>
    
    <script>
        // --- [시스템 로그 유틸] ---
        function log(message, color = '#0f0') {
            const consoleDiv = document.getElementById('log-console');
            if (consoleDiv) {
                consoleDiv.innerHTML += `<br><span style="color: ${color};">> ${message}</span>`;
                consoleDiv.scrollTop = consoleDiv.scrollHeight;
            }
        }

        // =========================================================
        // [1단계 이식 복합체] Enums & GPS & 필드 레이아웃 연산 규칙
        // =========================================================
        const CardLocation = { Deck: 0x01, Hand: 0x02, MonsterZone: 0x04, SpellZone: 0x08, Grave: 0x10, Removed: 0x20, Extra: 0x40, Overlay: 0x80 };
        const CardPosition = { FaceUp: 0x1, FaceDown: 0x2, Attack: 0x4, Defense: 0x8 };
        
        class GPS {
            constructor(controller, location, sequence, position = CardPosition.FaceUp) {
                this.controller = controller;
                this.location = location;
                this.sequence = sequence;
                this.position = position;
            }
        }

        const FieldConfig = { fieldSize: 1.0, masterRule: 5, canvasWidth: 1024, canvasHeight: 600 };

        function getPointCanvasPosition(gps) {
            const centerX = FieldConfig.canvasWidth / 2;
            const centerY = FieldConfig.canvasHeight / 2;
            const real = (FieldConfig.fieldSize - 1) * 0.9 + 1.0;
            const pScale = 24 * real;
            let returnX = 0, zOffset = 0;

            if ((gps.location & CardLocation.MonsterZone) > 0) {
                let realIndex = gps.sequence;
                if (gps.controller === 0) {
                    zOffset = -4.5 * real;
                } else {
                    if (realIndex <= 4) realIndex = 4 - gps.sequence;
                    else if (realIndex === 5) realIndex = 6;
                    else if (realIndex === 6) realIndex = 5;
                    zOffset = 4.5 * real;
                }
                switch (realIndex) {
                    case 0: returnX = -10.5; break;
                    case 1: returnX = -5.2; break;
                    case 2: returnX = 0; break;
                    case 3: returnX = 5.2; break;
                    case 4: returnX = 10.5; break;
                    case 5: returnX = -5.2; zOffset = 0; break; 
                    case 6: returnX = 5.2; zOffset = 0; break; 
                }
                return { x: centerX + (returnX * pScale), y: centerY + (zOffset * -1 * pScale * 1.1) };
            }
            
            if ((gps.location & CardLocation.SpellZone) > 0) {
                let realIndex = gps.sequence;
                if (gps.controller === 0) zOffset = -8.5 * real;
                else {
                    if (realIndex <= 4) realIndex = 4 - gps.sequence;
                    zOffset = 8.5 * real;
                }
                switch (realIndex) {
                    case 0: returnX = -10.5; break;
                    case 1: returnX = -5.2; break;
                    case 2: returnX = 0; break;
                    case 3: returnX = 5.2; break;
                    case 4: returnX = 10.5; break;
                }
                return { x: centerX + (returnX * pScale), y: centerY + (zOffset * -1 * pScale * 1.1) };
            }

            return { x: centerX, y: centerY };
        }

        // =========================================================
        // [2단계 이식 복합체] WebGameCard 모델 및 정렬 매니저
        // =========================================================
        class WebGameCard {
            constructor(id, code, gps) {
                this.id = id;
                this.code = code;
                this.gps = gps;
                this.x = FieldConfig.canvasWidth / 2;
                this.y = FieldConfig.canvasHeight / 2;
                this.targetX = this.x;
                this.targetY = this.y;
                this.width = 66;
                this.height = 96;
                this.moveSpeed = 0.12;
                this.isHovered = false;
            }

            update() {
                this.x += (this.targetX - this.x) * this.moveSpeed;
                this.y += (this.targetY - this.y) * this.moveSpeed;
            }

            draw(context) {
                context.save();
                let renderY = this.y;
                if (this.isHovered && this.gps.location === CardLocation.Hand) {
                    renderY -= 20; 
                }

                // 카드 바디 프레임
                context.fillStyle = this.gps.controller === 0 ? '#2c1d11' : '#1d2c2e';
                context.fillRect(this.x, renderY, this.width, this.height);
                
                // 테두리 강조 연출
                context.strokeStyle = this.isHovered ? '#ffea00' : '#444';
                context.lineWidth = this.isHovered ? 3 : 1;
                context.strokeRect(this.x, renderY, this.width, this.height);

                // 정보 텍스트 기입
                context.fillStyle = '#fff';
                context.font = 'bold 9px monospace';
                context.fillText(this.gps.controller === 0 ? "ME" : "OP", this.x + 5, renderY + 15);
                context.fillText(this.code, this.x + 5, renderY + 30);
                context.restore();
            }
        }

        function arrangeCards(allCards) {
            const myHand = allCards.filter(c => c.gps.controller === 0 && c.gps.location === CardLocation.Hand);
            const opHand = allCards.filter(c => c.gps.controller === 1 && c.gps.location === CardLocation.Hand);
            const centerX = FieldConfig.canvasWidth / 2;
            const maxHandWidth = 500;
            const cardW = 66;

            if (myHand.length > 0) {
                let interval = cardW + 5;
                if (myHand.length * interval > maxHandWidth) interval = maxHandWidth / myHand.length;
                const startX = centerX - ((myHand.length - 1) * interval) / 2 - cardW / 2;
                myHand.forEach((card, i) => {
                    card.gps.sequence = i;
                    card.targetX = startX + (i * interval);
                    card.targetY = FieldConfig.canvasHeight - 110;
                });
            }

            if (opHand.length > 0) {
                let interval = cardW + 5;
                if (opHand.length * interval > maxHandWidth) interval = maxHandWidth / opHand.length;
                const startX = centerX + ((opHand.length - 1) * interval) / 2 - cardW / 2;
                opHand.forEach((card, i) => {
                    card.gps.sequence = i;
                    card.targetX = startX - (i * interval);
                    card.targetY = 15;
                });
            }

            allCards.forEach(card => {
                if (card.gps.location !== CardLocation.Hand) {
                    const pos = getPointCanvasPosition(card.gps);
                    card.targetX = pos.x - card.width / 2;
                    card.targetY = pos.y - card.height / 2;
                }
            });
        }

        // =========================================================
        // [3단계 이식 복합체] 충돌 감지 및 ㅂ.txt 프리뷰 처리장치
        // =========================================================
        let globalCodeForShow = 0;

        function webAnimationShowCardCodeHandler(code) {
            if (!code || globalCodeForShow === code) return;
            globalCodeForShow = code;
            
            const previewImg = document.getElementById('preview-image');
            const placeholder = document.getElementById('preview-placeholder');
            
            if (previewImg && placeholder) {
                previewImg.src = `https://images.ygoprodeck.com/images/cards/${code}.jpg`;
                placeholder.style.display = 'none';
                previewImg.style.display = 'block';
                log(`카드 탐색 프리뷰 동적 결합: ${code}`);
            }
        }

        function setupMouseInteraction(canvasElement, allCards) {
            canvasElement.addEventListener('mousemove', (e) => {
                const rect = canvasElement.getBoundingClientRect();
                const mx = e.clientX - rect.left;
                const my = e.clientY - rect.top;
                let found = null;

                for (let i = allCards.length - 1; i >= 0; i--) {
                    const c = allCards[i];
                    let rY = c.y;
                    if (c.isHovered && c.gps.location === CardLocation.Hand) rY -= 20;
                    if (mx >= c.x && mx <= c.x + c.width && my >= rY && my <= rY + c.height) {
                        found = c;
                        break;
                    }
                }

                allCards.forEach(c => {
                    if (c === found) {
                        if (!c.isHovered) {
                            c.isHovered = true;
                            webAnimationShowCardCodeHandler(c.code);
                        }
                    } else c.isHovered = false;
                });
            });
        }

        // =========================================================
        // [4단계 이식 복합체] 메인 구동 루프 및 가상 데이터 매핑 환경
        // =========================================================
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const cardList = [];
        let cardIdCounter = 1;

        // 버튼 클릭 유틸: 데모 카드 투입기
        function addDemoCard(controller, location, code) {
            const sequenceCounter = cardList.filter(c => c.gps.controller === controller && c.gps.location === location).length;
            const newCard = new WebGameCard(cardIdCounter++, code, new GPS(controller, location, sequenceCounter));
            cardList.push(newCard);
            arrangeCards(cardList);
            log(`${controller === 0 ? '내' : '상대'} 구역에 카드 일련번호 [${code}] 배치 감지.`);
        }

        // 필드 고정 라인 레이아웃 가이드선 드로잉 함수
        function drawFieldSlots() {
            ctx.strokeStyle = '#3a4454';
            ctx.lineWidth = 1.5;
            
            // 내 구역/상대 구역 가이드라인 (5칸 슬롯 비례 렌더링)
            for(let i=0; i<5; i++) {
                let myGpsM = new GPS(0, CardLocation.MonsterZone, i);
                let myPosM = getPointCanvasPosition(myGpsM);
                ctx.strokeRect(myPosM.x - 33, myPosM.y - 48, 66, 96);

                let myGpsS = new GPS(0, CardLocation.SpellZone, i);
                let myPosS = getPointCanvasPosition(myGpsS);
                ctx.strokeRect(myPosS.x - 33, myPosS.y - 48, 66, 96);

                let opGpsM = new GPS(1, CardLocation.MonsterZone, i);
                let opPosM = getPointCanvasPosition(opGpsM);
                ctx.strokeRect(opPosM.x - 33, opPosM.y - 48, 66, 96);
            }
        }

        // 메인 렌더 프레임 루프 (유니티 Update() 대체)
        function runMainGameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 1. 배경 매트 가이드라인 드로우
            drawFieldSlots();

            // 2. 카드 동적 좌표 보간 연산 및 드로우
            cardList.forEach(card => {
                card.update();
                card.draw(ctx);
            });

            requestAnimationFrame(runMainGameLoop);
        }

        // --- 초기 시스템 기동 장치 ---
        window.onload = () => {
            setupMouseInteraction(canvas, cardList);
            
            // 최초 데모용 스타팅 카드 분배 세팅
            addDemoCard(0, CardLocation.Hand, 24094653); // 블랙매지션
            addDemoCard(0, CardLocation.Hand, 89631139); // 푸른눈의 백룡
            addDemoCard(1, CardLocation.Hand, 46986414); // 상대 카드

            runMainGameLoop();
            log("유니티 ㅂ.txt 이식 1~4단계 완전체 통합 웹 클라이언트 구동 성공.");
        };

        // Emscripten 룰 브릿지 연동 인터페이스 정의
        var Module = {
            onRuntimeInitialized: function() {
                log("WASM 오피셜 룰 엔진 core와 결합 완료.", '#00ffff');
            }
        };
    </script>
</body>
</html>
