name: Pure Cpp to WebAssembly and Self-Commit

on:
  push:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  build-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Setup Emscripten compiler
        uses: mymindstorm/setup-emsdk@v11
        with:
          version: 'latest'

      # [정산 핵심] HTML 파일 내부에서 태그(<...>)를 실시간으로 제거하고 
      # 순수 C++ 구문만 추출하여 임시 .cpp 파일로 만들어내는 파이프라인 구축
      - name: Extract Pure Cpp from HTML and Compile
        run: |
          echo "=== HTML 파일에서 순수 C++ 소스 정산 중 ==="
          for file in card.html duel.html field.html effect.html group.html processor.html 데이터베이스.html; do
            if [ -f "$file" ]; then
              # sed 명령어로 모든 HTML 태그(<[^>]*>)를 완벽하게 제거하고 알맹이만 임시 cpp로 복사
              sed 's/<[^>]*>//g' "$file" > "${file%.html}.tmp.cpp"
              echo "✓ $file 변환 완료 -> ${file%.html}.tmp.cpp"
            fi
          done

          echo "=== Emscripten 컴파일 시작 ==="
          emcc *.tmp.cpp \
            -O3 \
            -std=c++17 \
            -I. \
            -s WASM=1 \
            -s EXPORTED_FUNCTIONS="['_create_duel', '_start_duel', '_process', '_new_card', '_set_player_info']" \
            -s EXPORTED_RUNTIME_METHODS="['ccall', 'cwrap']" \
            -o ocgcore.js

      - name: Commit and Push Compiled Files Directly
        run: |
          git config --local user.email "1panservice4-dev@users.noreply.github.com"
          git config --local user.name "GitHub Action Robot"
          
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          
          git add ocgcore.js ocgcore.wasm
          
          if ! git diff --cached --quiet; then
            git commit -m "chore: [자동 정산] 웹 구동용 핵심 엔진 최신 빌드 완료 (ocgcore.js / wasm)"
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "변동 내역이 없어 패스합니다."
          fi
