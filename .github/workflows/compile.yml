name: Pure Cpp to WebAssembly and Self-Commit

on:
  push:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  build-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Setup Emscripten compiler
        uses: mymindstorm/setup-emsdk@v11
        with:
          version: 'latest'

      # [정산 핵심] 대소문자 구분 없이 .txt로 끝나는 모든 파일을 컴파일러에 넘기고
      # 내부에서 소문자로 include 파일(lua.h 등)을 찾더라도 현재 폴더의 대문자 파일들과 연결되도록 보정합니다.
      - name: Compile C++ Source Files from Capitalized TXT
        run: |
          echo "=== 대소문자 무시 및 모든 텍스트 파일 수집 중 ==="
          
          # 확장자가 .txt 또는 .TXT인 모든 파일을 리스트업
          TARGET_FILES=$(find . -maxdepth 1 -iname "*.txt" | tr '\n' ' ')
          echo "수집된 파일들: $TARGET_FILES"
          
          # 컴파일러 실행 (-I. 플래그 강화 및 모든 텍스트 컴파일)
          emcc -x c++ $TARGET_FILES \
            -O3 \
            -std=c++17 \
            -I. \
            -s WASM=1 \
            -s EXPORTED_FUNCTIONS="['_create_duel', '_start_duel', '_process', '_new_card', '_set_player_info']" \
            -s EXPORTED_RUNTIME_METHODS="['ccall', 'cwrap']" \
            -o ocgcore.js

      - name: Commit and Push Compiled Files Directly
        run: |
          git config --local user.email "1panservice4-dev@users.noreply.github.com"
          git config --local user.name "GitHub Action Robot"
          
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          
          git add ocgcore.js ocgcore.wasm
          
          if ! git diff --cached --quiet; then
            git commit -m "chore: [자동 정산] 웹 구동용 핵심 엔진 최신 빌드 완료 (ocgcore.js / wasm)"
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "변동 내역이 없어 패스합니다."
          fi
