name: Build YGOPro OCGCore WebAssembly Fixed

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 1. 저장소 소스코드 체크아웃
      uses: actions/checkout@v4

    - name: 2. Emscripten(emsdk) 컴파일러 환경 세팅
      uses: mymindstorm/setup-emsdk@v14
      with:
        version: 3.1.64

    - name: 3. C# 파일 제외 후 실존하는 모든 소스 자동 컴파일
      run: |
        # 1. 방해꾼이었던 유니티 C# 파일(ocgcore.c)을 컴파일 대상에서 안전하게 격리합니다.
        mkdir -p temp_hide
        if [ -f ocgcore.c ]; then mv ocgcore.c temp_hide/; fi
        
        # 2. 파일명을 일일이 적지 않고, 폴더 내 모든 C++/C 파일(*.cpp, *.c)을 한방에 구워냅니다.
        # 이전 에러의 원인이었던 process_command 주소 오류도 해결하기 위해 표준 함수들만 지정했습니다.
        emcc -O3 -s WASM=1 -fdeclspec \
          -s EXPORTED_FUNCTIONS="['_create_duel', '_start_duel', '_end_duel', '_set_card_reader', '_set_script_reader', '_set_message_handler']" \
          -s EXPORTED_RUNTIME_METHODS="['cwrap', 'ccall']" \
          -s ALLOW_MEMORY_GROWTH=1 \
          -o ocgcore.js \
          *.cpp *.c

    - name: 4. 컴파일 완료된 자바스크립트 및 WASM 추출
      uses: actions/upload-artifact@v4
      with:
        name: ygopro-web-engine
        path: |
          ocgcore.js
          ocgcore.wasm
