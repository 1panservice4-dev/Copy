name: Pure Cpp to WebAssembly and Self-Commit

on:
  push:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  build-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Emscripten compiler
        uses: mymindstorm/setup-emsdk@v11
        with:
          version: 'latest'

      - name: Compile Pure C++ and Lua Source Files
        run: |
          echo "=== 1단계: 루아 C 소스 파일 컴파일 ==="
          emcc -O3 -c l*.c -I.

          echo "=== 2단계: OCGCore C++ 소스 파일 컴파일 ==="
          # C++ 파일 컴파일 시, 전역 매크로 주입을 통해 모든 루아 API가 extern "C" 규칙을 따르도록 강제합니다.
          em++ -O3 -std=c++17 -c *.cpp -D"__declspec(x)=" -D"LUA_API=extern \"C\"" -D"LUALIB_API=extern \"C\"" -I.

          echo "=== 3단계: 웹어셈블리 최종 링크 ==="
          em++ *.o \
            -O3 \
            -s WASM=1 \
            -s EXPORTED_FUNCTIONS="['_create_duel','_start_duel','_process','_new_card','_set_player_info']" \
            -s EXPORTED_RUNTIME_METHODS="['ccall','cwrap']" \
            -o ocgcore.js

      - name: Commit and Push Compiled Files Direct
        run: |
          git config --local user.email "1panservice4-dev@users.noreply.github.com"
          git config --local user.name "GitHub Action Robot"
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git add ocgcore.js ocgcore.wasm
          if ! git diff --cached --quiet; then
            git commit -m "chore: 웹어셈블리 엔진 빌드 완벽 성공 및 배포 파일 자동 갱신"
            git push origin HEAD:${{ github.ref_name }}
          fi
