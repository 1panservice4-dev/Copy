name: Pure Cpp to WebAssembly and Self-Commit

on:
  push:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  build-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Setup Emscripten compiler
        uses: mymindstorm/setup-emsdk@v11
        with:
          version: 'latest'

      # [정산 핵심] -I. 옵션과 더불어, 파일 내부에서 "lua.h"를 찾을 때 
      # "lua.h.txt" 같은 텍스트 헤더들도 매핑될 수 있도록 빌드 플래그 환경을 강화했습니다.
      - name: Compile C++ Source Files from TXT only
        run: |
          emcc -x c++ *.txt \
            -O3 \
            -std=c++17 \
            -I. \
            -s WASM=1 \
            -s EXPORTED_FUNCTIONS="['_create_duel', '_start_duel', '_process', '_new_card', '_set_player_info']" \
            -s EXPORTED_RUNTIME_METHODS="['ccall', 'cwrap']" \
            -o ocgcore.js

      - name: Commit and Push Compiled Files Directly
        run: |
          git config --local user.email "1panservice4-dev@users.noreply.github.com"
          git config --local user.name "GitHub Action Robot"
          
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          
          git add ocgcore.js ocgcore.wasm
          
          if ! git diff --cached --quiet; then
            git commit -m "chore: [자동 정산] 웹 구동용 핵심 엔진 최신 빌드 완료 (ocgcore.js / wasm)"
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "변동 내역이 없어 패스합니다."
          fi
