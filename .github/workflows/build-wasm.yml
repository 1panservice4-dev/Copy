name: Build YGOPro OCGCore WebAssembly Fixed

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 1. 저장소 소스코드 체크아웃
      uses: actions/checkout@v4

    - name: 2. Emscripten(emsdk) 컴파일러 환경 세팅
      uses: mymindstorm/setup-emsdk@v14
      with:
        version: 3.1.64

    - name: 3. 사진 속 모든 소스 파일 목록 기반 컴파일 (중복 제거 완료)
      run: |
        emcc -O3 -s WASM=1 \
          -s EXPORTED_FUNCTIONS="['_create_duel', '_start_duel', '_end_duel', '_set_card_reader', '_set_script_reader', '_set_message_handler', '_process_command', '_get_log_message']" \
          -s EXTRA_EXPORTED_RUNTIME_METHODS="['cwrap', 'ccall']" \
          -s ALLOW_MEMORY_GROWTH=1 \
          -o ocgcore.js \
          ocgapi.cpp duel.cpp card.cpp field.cpp processor.cpp effect.cpp group.cpp \
          interpreter.cpp libcard.cpp libduel.cpp libeffect.cpp libgroup.cpp \
          mem.cpp scriptlib.cpp \
          lapi.c lauxlib.c ido.c \
          lbaselib.c lbitlib.c lcode.c lcorolib.c lctype.c ldblib.c ldebug.c \
          ldump.c lfunc.c lgc.c linit.c liolib.c llex.c lmathlib.c lmem.c \
          loadlib.c lobject.c lopcodes.c loslib.c lparser.c lstate.c \
          lstring.c lstrlib.c ltable.c ltm.c lundump.c lvm.c lzio.c

    - name: 4. 컴파일 완료된 자바스크립트 및 WASM 추출
      uses: actions/upload-artifact@v4
      with:
        name: ygopro-web-engine
        path: |
          ocgcore.js
          ocgcore.wasm
