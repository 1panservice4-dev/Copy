<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Web YGOPRO 실제 플레이 환경</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #121214; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        #game-container { display: flex; gap: 20px; background: #1e1e24; padding: 20px; border-radius: 12px; }
        #game-canvas { background: #151518; border: 2px solid #3a3a44; border-radius: 8px; cursor: pointer; }
        #side-panel { width: 280px; display: flex; flex-direction: column; gap: 12px; }
        #card-preview { width: 100%; height: 380px; background: #0b0b0d; border: 2px solid #3a3a44; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
        #card-preview img { max-width: 100%; max-height: 100%; object-fit: contain; }
        #log-console { flex-grow: 1; background: #0b0b0d; border: 1px solid #2a2a35; border-radius: 8px; padding: 12px; font-family: monospace; font-size: 11px; color: #38ef7d; overflow-y: auto; height: 190px; }
        
        /* 카드 우클릭/클릭 시 나타날 플레이 커맨드 메뉴 */
        #context-menu { position: absolute; display: none; background: #2a2d34; border: 1px solid #4fadf7; border-radius: 4px; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        #context-menu div { padding: 8px 16px; cursor: pointer; font-size: 13px; font-weight: bold; }
        #context-menu div:hover { background: #4fadf7; color: #121214; }
    </style>
</head>
<body>

    <h2 style="margin-bottom: 15px;">WebAssembly OCGCore 실시간 플레이 테스트</h2>

    <div id="game-container">
        <canvas id="game-canvas" width="1024" height="600"></canvas>
        <div id="side-panel">
            <div id="card-preview">
                <span id="preview-placeholder" style="color: #4a4a5a;">카드를 클릭/우클릭 하세요</span>
                <img id="preview-image" src="" style="display: none;">
            </div>
            <div id="log-console">> 엔진 및 WASM 런타임 로딩 대기 중...</div>
        </div>
    </div>

    <div id="context-menu">
        <div id="menu-summon" onclick="handlePlayAction('summon')">일반 소환 (Summon)</div>
        <div id="menu-activate" onclick="handlePlayAction('activate')">효과 발동 (Activate)</div>
    </div>

    <script src="ocgcore.js"></script>

    <script>
        function log(message, color = '#38ef7d') {
            const consoleDiv = document.getElementById('log-console');
            if (consoleDiv) {
                consoleDiv.innerHTML += `<br><span style="color: ${color};">> ${message}</span>`;
                consoleDiv.scrollTop = consoleDiv.scrollHeight;
            }
        }

        // 기본 물리 환경 구조체 상속
        const CardLocation = { Deck: 0x01, Hand: 0x02, MonsterZone: 0x04, SpellZone: 0x08 };
        class GPS { constructor(controller, location, sequence) { this.controller = controller; this.location = location; this.sequence = sequence; } }
        const FieldConfig = { canvasWidth: 1024, canvasHeight: 600 };

        class WebGameCard {
            constructor(id, code, gps) {
                this.id = id; this.code = code; this.gps = gps;
                this.x = FieldConfig.canvasWidth / 2; this.y = FieldConfig.canvasHeight / 2;
                this.targetX = this.x; this.targetY = this.y;
                this.width = 64; this.height = 92; this.moveSpeed = 0.12; this.isHovered = false;
            }
            update() { this.x += (this.targetX - this.x) * this.moveSpeed; this.y += (this.targetY - this.y) * this.moveSpeed; }
            draw(ctx) {
                ctx.save();
                let rY = this.isHovered && this.gps.location === CardLocation.Hand ? this.y - 15 : this.y;
                ctx.fillStyle = this.gps.controller === 0 ? '#2e1c0c' : '#0c222e';
                ctx.fillRect(this.x, rY, this.width, this.height);
                ctx.strokeStyle = this.isHovered ? '#ffee00' : '#444';
                ctx.strokeRect(this.x, rY, this.width, this.height);
                ctx.fillStyle = '#fff'; ctx.font = '9px monospace'; ctx.fillText(this.code, this.x + 6, rY + 20);
                ctx.restore();
            }
        }

        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const cardList = [];
        let selectedCard = null; 
        let pDuelInstance = 0;   
        let isEngineReady = false; // 가상 시뮬레이션 진입 방지용 플래그

        // ===================================================================
        // 🚀 수정된 핵심 기동부: 전역 Module을 덮어쓰지 않고 확장 등록합니다.
        // ===================================================================
        window.Module = window.Module || {};
        
        Module['onRuntimeInitialized'] = function() {
            isEngineReady = true; // 실제 엔진 로딩 완료됨을 알림
            log("WASM 핵심 오피셜 룰 엔진(ocgcore.js) 결합 성공!", "#00ffff");
            
            try {
                // 더 안전하게 Module에서 직접 cwrap 함수를 추출해 맵핑합니다.
                const create_duel = Module.cwrap('create_duel', 'number', ['number']);
                
                log("WASM 내부 메모리에 유희왕 가상 룰 판(Instance)을 생성합니다.");
                let seed = Math.floor(Math.random() * 12345);
                pDuelInstance = create_duel(seed); 
                log(`[성공] 듀얼 인스턴스가 주소지 ${pDuelInstance}에 성공적으로 배치되었습니다.`);

                initGamePlayData();
                runMainGameLoop();
                
            } catch (err) {
                log(`엔진 기동 실패 (컴파일 환경 에러): ${err.message}`, 'red');
            }
        };

        // 초기 시작 덱/패 세팅 함수
        function initGamePlayData() {
            // 카드 중복 로딩 방지
            if (cardList.length > 0) return;
            
            // 내 패에 블랙 매지션(24094653)과 푸른 눈의 백룡(89631139) 추가
            cardList.push(new WebGameCard(1, 24094653, new GPS(0, CardLocation.Hand, 0)));
            cardList.push(new WebGameCard(2, 89631139, new GPS(0, CardLocation.Hand, 1)));
            arrangeCards();
            setupInteraction();
        }

        // ===================================================================
        // 🕹️ 유저 플레이 액션(소환/발동) 처리
        // ===================================================================
        function handlePlayAction(actionType) {
            const menu = document.getElementById('context-menu');
            menu.style.display = 'none';
            if (!selectedCard) return;

            if (actionType === 'summon') {
                log(`[플레이어 액션] ${selectedCard.code} 카드를 몬스터 존에 일반 소환 시도합니다.`, '#ffea00');
                
                // 패에서 몬스터 존으로 위치 상태 변경
                selectedCard.gps.location = CardLocation.MonsterZone;
                selectedCard.gps.sequence = 2; // 메인 몬스터 존 중앙 슬롯 배정
                
                arrangeCards();
            }
        }

        // 인터랙션 (클릭 및 컨텍스트 메뉴 제어)
        function setupInteraction() {
            canvas.addEventListener('mousemove', (e) => {
                const rect = canvas.getBoundingClientRect();
                const mx = e.clientX - rect.left; const my = e.clientY - rect.top;
                cardList.forEach(c => {
                    c.isHovered = (mx >= c.x && mx <= c.x + c.width && my >= c.y && my <= c.y + c.height);
                    if(c.isHovered) {
                        document.getElementById('preview-placeholder').style.display = 'none';
                        const img = document.getElementById('preview-image');
                        img.src = `https://images.ygoprodeck.com/images/cards/${c.code}.jpg`;
                        img.style.display = 'block';
                    }
                });
            });

            // 우클릭 시 컨텍스트 메뉴 노출 제어 (오타 수정됨: menu.style.style -> menu.style.display)
            canvas.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                const hoveredCard = cardList.find(c => c.isHovered && c.gps.controller === 0);
                if (hoveredCard) {
                    selectedCard = hoveredCard;
                    const menu = document.getElementById('context-menu');
                    menu.style.left = `${e.clientX}px`;
                    menu.style.top = `${e.clientY}px`;
                    menu.style.display = 'block';
                }
            });

            window.addEventListener('click', () => { document.getElementById('context-menu').style.display = 'none'; });
        }

        // 카드 좌표 정렬
        function arrangeCards() {
            cardList.forEach(card => {
                if (card.gps.location === CardLocation.Hand) {
                    card.targetX = 300 + (card.gps.sequence * 80);
                    card.targetY = FieldConfig.canvasHeight - 120;
                } else if (card.gps.location === CardLocation.MonsterZone) {
                    card.targetX = FieldConfig.canvasWidth / 2 - card.width / 2;
                    card.targetY = FieldConfig.canvasHeight / 2 + 20;
                }
            });
        }

        function runMainGameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // 필드 가이드선 그리기
            ctx.strokeStyle = '#3a3a44'; ctx.strokeRect(150, 150, 724, 150); ctx.strokeRect(150, 310, 724, 150);
            
            cardList.forEach(card => { card.update(); card.draw(ctx); });
            requestAnimationFrame(runMainGameLoop);
        }

        // 엔진 로딩 실패 시 작동할 가상 시뮬레이터 백업 예외 장치
        setTimeout(() => {
            if (!isEngineReady && pDuelInstance === 0) {
                log("서버 로딩 시간이 초과되어 가상 시뮬레이션 플레이 모드로 진입합니다.", "#ff9f43");
                initGamePlayData(); runMainGameLoop();
            }
        }, 1500);
    </script>
</body>
</html>
