name: Build OCGCore WebAssembly Fixed

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # 웹에서 Run workflow 버튼으로 수동 실행도 가능하게 함

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 1. 저장소 코드 가져오기
      uses: actions/checkout@v4

    - name: 2. Emscripten 컴파일러 환경 구성
      uses: mymindstorm/setup-emsdk@v14
      with:
        version: 3.1.64

    - name: 3. C++ 및 C 파일 완전 컴파일 (오류 수정본)
      run: |
        emcc -O3 -s WASM=1 \
          -s EXPORTED_FUNCTIONS="['_create_duel', '_start_duel', '_end_duel', '_set_card_reader', '_set_script_reader', '_set_message_handler', '_process_command', '_get_log_message']" \
          -s EXTRA_EXPORTED_RUNTIME_METHODS="['cwrap', 'ccall']" \
          -s ALLOW_MEMORY_GROWTH=1 \
          -o ocgcore.js \
          Ocgapi.cpp 듀얼.cpp card.cpp 필드.cpp Processor.cpp Effect.cpp Group.cpp \
          Lapi.c Lauxlib.c Ido.c
          
    - name: 4. 빌드 성공한 ocgcore.js 및 wasm 파일 추출
      uses: actions/upload-artifact@v4
      with:
        name: fixed-ygopro-web-engine
        path: |
          ocgcore.js
          ocgcore.wasm
