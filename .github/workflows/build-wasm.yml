name: Build YGOPro OCGCore WebAssembly Force Auto

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 1. 저장소 소스코드 체크아웃
      uses: actions/checkout@v4

    - name: 2. Emscripten(emsdk) 컴파일러 환경 세팅
      uses: mymindstorm/setup-emsdk@v14
      with:
        version: 3.1.64

    - name: 3. 와일드카드로 실존하는 모든 소스 강제 컴파일
      run: |
        # 폴더 내에 실제로 존재하는 모든 .cpp 파일과 .c 파일을 와일드카드(*)로 한 번에 컴파일러에 던집니다.
        # 이 방식은 존재하지 않는 파일명을 적지 않으므로 'No such file' 에러가 절대 나지 않습니다.
        
        emcc -O3 -s WASM=1 \
          -s EXPORTED_FUNCTIONS="['_create_duel', '_start_duel', '_end_duel', '_set_card_reader', '_set_script_reader', '_set_message_handler', '_process_command', '_get_log_message']" \
          -s EXTRA_EXPORTED_RUNTIME_METHODS="['cwrap', 'ccall']" \
          -s ALLOW_MEMORY_GROWTH=1 \
          -o ocgcore.js \
          *.cpp *.c 2>/dev/null || emcc -O3 -s WASM=1 -s EXPORTED_FUNCTIONS="['_create_duel', '_start_duel', '_end_duel', '_set_card_reader', '_set_script_reader', '_set_message_handler', '_process_command', '_get_log_message']" -s EXTRA_EXPORTED_RUNTIME_METHODS="['cwrap', 'ccall']" -s ALLOW_MEMORY_GROWTH=1 -o ocgcore.js *.cpp *.c

    - name: 4. 컴파일 완료된 자바스크립트 및 WASM 추출
      uses: actions/upload-artifact@v4
      with:
        name: ygopro-web-engine
        path: |
          ocgcore.js
          ocgcore.wasm
